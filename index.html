<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Someone Special ❤️</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="section active" id="section1">
    <h1>Hi My Love ❤️</h1>
    <p>I have something special to tell you...</p>
    <button onclick="nextSection(2)">Next ➜</button>
  </section>

  <section class="section" id="section2">
    <h1>From the day I met you...</h1>
    <p>My world became brighter, happier, and more beautiful 🌸</p>
    <button onclick="nextSection(3)">Next ➜</button>
  </section>

  <section class="section" id="section3">
    <h1>You are my today and all my tomorrows 💖</h1>
    <h2>Will you marry me? 💍</h2>
    <div class="buttons">
      <button class="yes" onclick="sayYes()">Yes 😍</button>
      <button class="no" onmouseover="moveButton(this)">No 😜</button>
    </div>
  </section>

  <section class="section" id="section4">
    <h1>Yayyyy!!! ❤️</h1>
    <p>You just made me the happiest person alive 🥰</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
